version: '3.8'

services:
  # MongoDB Database Service
  db:
    image: mongo:6.0-jammy
    container_name: school-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # Node.js API Service
  backend:
    build: ./backend
    container_name: school-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://db:27017/school_db
      - JWT_SECRET=super_secret_jwt_key_987654321
      - NODE_ENV=production
    depends_on:
      - db

  # React Webserver Service
  frontend:
    build: ./frontend
    container_name: school-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
